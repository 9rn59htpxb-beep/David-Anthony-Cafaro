name: Update Status Dashboard

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate status dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")

          # ── Open pull requests ──────────────────────────────────────────────
          PR_JSON=$(gh pr list --repo "$REPO" --state open --json number,title,url,author,createdAt --limit 20)
          PR_COUNT=$(echo "$PR_JSON" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))")

          if [ "$PR_COUNT" -eq 0 ]; then
            PR_SECTION="_No open pull requests._"
          else
            PR_SECTION="| # | Title | Author | Opened |"$'\n'
            PR_SECTION+="|----|-------|--------|--------|"$'\n'
            PR_SECTION+=$(echo "$PR_JSON" | python3 -c "
          import sys, json
          rows = []
          for pr in json.load(sys.stdin):
              rows.append('| [#{number}]({url}) | {title} | {author} | {date} |'.format(
                  number=pr['number'],
                  url=pr['url'],
                  title=pr['title'].replace('|','\\\\|'),
                  author=pr['author']['login'],
                  date=pr['createdAt'][:10],
              ))
          print('\n'.join(rows))
          ")
          fi

          # ── Open issues ─────────────────────────────────────────────────────
          ISSUE_JSON=$(gh issue list --repo "$REPO" --state open --json number,title,url,author,createdAt --limit 20)
          ISSUE_COUNT=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))")

          if [ "$ISSUE_COUNT" -eq 0 ]; then
            ISSUE_SECTION="_No open issues._"
          else
            ISSUE_SECTION="| # | Title | Author | Opened |"$'\n'
            ISSUE_SECTION+="|----|-------|--------|--------|"$'\n'
            ISSUE_SECTION+=$(echo "$ISSUE_JSON" | python3 -c "
          import sys, json
          rows = []
          for issue in json.load(sys.stdin):
              rows.append('| [#{number}]({url}) | {title} | {author} | {date} |'.format(
                  number=issue['number'],
                  url=issue['url'],
                  title=issue['title'].replace('|','\\\\|'),
                  author=issue['author']['login'],
                  date=issue['createdAt'][:10],
              ))
          print('\n'.join(rows))
          ")
          fi

          # ── Recent commits ───────────────────────────────────────────────────
          COMMIT_JSON=$(gh api "repos/$REPO/commits?per_page=5" --jq '[.[] | {sha: .sha[0:7], message: (.commit.message | split("\n")[0]), author: .commit.author.name, date: (.commit.author.date | split("T")[0])}]')
          COMMIT_SECTION="| SHA | Message | Author | Date |"$'\n'
          COMMIT_SECTION+="|----|---------|--------|------|"$'\n'
          COMMIT_SECTION+=$(echo "$COMMIT_JSON" | python3 -c "
          import sys, json
          rows = []
          for c in json.load(sys.stdin):
              rows.append('| \`{sha}\` | {msg} | {author} | {date} |'.format(
                  sha=c['sha'],
                  msg=c['message'].replace('|','\\\\|'),
                  author=c['author'].replace('|','\\\\|'),
                  date=c['date'],
              ))
          print('\n'.join(rows))
          ")

          # ── Workflow last run ────────────────────────────────────────────────
          WF_JSON=$(gh api "repos/$REPO/actions/workflows/update-status.yml/runs?per_page=1" --jq '.workflow_runs[0] // {} | {conclusion: (.conclusion // "pending"), created_at: (.created_at // "—")}' 2>/dev/null || echo '{"conclusion":"—","created_at":"—"}')
          WF_CONCLUSION=$(echo "$WF_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('conclusion','—'))")
          WF_DATE=$(echo "$WF_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('created_at','—')[:10] if d.get('created_at','—') != '—' else '—')")

          # Export variables so the Python script below can read them
          export NOW PR_SECTION ISSUE_SECTION COMMIT_SECTION WF_DATE WF_CONCLUSION

          # ── Write status.md ──────────────────────────────────────────────────
          python3 - <<PYEOF
import os

now          = os.environ["NOW"]
pr_section   = os.environ["PR_SECTION"]
issue_section= os.environ["ISSUE_SECTION"]
commit_section=os.environ["COMMIT_SECTION"]
wf_date      = os.environ["WF_DATE"]
wf_conclusion= os.environ["WF_CONCLUSION"]

content = f"""# Status Dashboard

> Auto-generated by \`.github/workflows/update-status.yml\`. Do not edit manually — changes will be overwritten on the next run.
>
> Last updated: **{now}**

---

## Tracked Repositories

| Repo | Kind | Language | Branch | Status |
|------|------|----------|--------|--------|
| [David-Anthony-Cafaro](https://github.com/9rn59htpxb-beep/David-Anthony-Cafaro) | control | Markdown | \`main\` | active |
| [flutter](https://github.com/9rn59htpxb-beep/flutter) | upstream-fork | Mixed | \`master\` | active |
| [ios-nrf-wi-fi-provisioner](https://github.com/9rn59htpxb-beep/ios-nrf-wi-fi-provisioner) | library | Swift | \`main\` | active |
| [openaimacpaw](https://github.com/9rn59htpxb-beep/openaimacpaw) | library | Swift | \`main\` | active |

---

## Open Pull Requests (this repo)

{pr_section}

---

## Open Issues (this repo)

{issue_section}

---

## Recent Commits (this repo — last 5)

{commit_section}

---

## Workflow Health

| Workflow | Last Run | Result |
|----------|----------|--------|
| update-status | {wf_date} | {wf_conclusion} |

---

_This file is the primary observability artifact for this control repo. For full history, see the git log._
"""

with open("loopback/status.md", "w") as fh:
    fh.write(content)
PYEOF

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loopback/status.md
          if git diff --cached --quiet; then
            echo "No changes to status.md — skipping commit."
          else
            git commit -m "chore: auto-update loopback/status.md [skip ci]"
            git push origin main
          fi
